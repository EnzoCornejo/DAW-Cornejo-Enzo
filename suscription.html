<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suscripción - La Capital</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
</head>
<body>

<header id="main-header">
    <div class="site-top-nav">
        <nav class="header-container">
            <ul class="topmenu">
                <li><a href="#">Inmuebles</a></li>
                <li><a href="#">Motores</a></li>
                <li><a href="#">Trabajo</a></li>
                <li><a href="#">Profesionales</a></li>
                <li><a href="#">Fúnebres</a></li>
                <li><a href="#">Beneficios</a></li>
                <li><a href="#">Turismo</a></li>
            </ul>
        </nav>
    </div>

    <div class="site-header__main-part">
        <div class="header-container flex-header">
            <div class="left-part">
                <button class="nav-toggle" aria-label="menu">☰</button>
            </div>

            <a href="index.html" class="site-logo">
                <img src="img-logo.png" alt="Logo del Diario">
            </a>

            <div class="right-part" style="width: 30px;"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <nav class="header-container">
            <ul class="bottommenu">
                <li><a href="#">Últimas Noticias</a></li>
                <li><a href="#">Ciudad</a></li>
                <li><a href="#">Región</a></li>
                <li><a href="#">Ovación</a></li>
                <li><a href="#">Economía</a></li>
                <li><a href="#">Policiales</a></li>
                <li><a href="#">Agroclave</a></li>
                <li><a href="#">Turismo</a></li>
            </ul>
        </nav>
    </div>
</header>

<main class="container">
    <article id="subscription-article">
        <header class="article-header">
            <h1 id="form-title">HOLA</h1>
            <p class="subtitle">Completá tus datos para suscribirte a nuestro diario digital.</p>
        </header>

        <section class="article-content">
            <form id="subscription-form" novalidate>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="fullName">Nombre completo</label>
                        <input type="text" id="fullName" name="fullName">
                        <p class="error-message" id="error-fullName"></p>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email">
                        <p class="error-message" id="error-email"></p>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password">
                        <p class="error-message" id="error-password"></p>
                    </div>

                    <div class="form-group">
                        <label for="repeatPassword">Repetir contraseña</label>
                        <input type="password" id="repeatPassword" name="repeatPassword">
                        <p class="error-message" id="error-repeatPassword"></p>
                    </div>

                    <div class="form-group">
                        <label for="age">Edad</label>
                        <input type="number" id="age" name="age">
                        <p class="error-message" id="error-age"></p>
                    </div>

                    <div class="form-group">
                        <label for="phone">Teléfono</label>
                        <input type="text" id="phone" name="phone">
                        <p class="error-message" id="error-phone"></p>
                    </div>

                    <div class="form-group">
                        <label for="address">Dirección</label>
                        <input type="text" id="address" name="address">
                        <p class="error-message" id="error-address"></p>
                    </div>

                    <div class="form-group">
                        <label for="city">Ciudad</label>
                        <input type="text" id="city" name="city">
                        <p class="error-message" id="error-city"></p>
                    </div>

                    <div class="form-group">
                        <label for="zipCode">Código Postal</label>
                        <input type="text" id="zipCode" name="zipCode">
                        <p class="error-message" id="error-zipCode"></p>
                    </div>

                    <div class="form-group">
                        <label for="dni">DNI</label>
                        <input type="text" id="dni" name="dni">
                        <p class="error-message" id="error-dni"></p>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" id="submit-btn">Enviar</button>
                </div>
            </form>
        </section>
    </article>
</main>

</body>
</html>
